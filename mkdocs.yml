site_name: HyperBeauty Level 1 - StartUp
site_url: https://ivanrobuschi-custom.github.io/Hyperbeauty-corso-Level1/
site_description: Corso di primo livello di configurazione base per HyperBeauty — Custom S.p.A.
site_author: Ivan Robuschi

theme:
  name: material
  language: it
  logo: assets/icons/logo.png
  favicon: assets/icons/favicon.png
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.path
    - navigation.sections
    - navigation.prune
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share

  palette:
    primary: custom
    accent: blue

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences

plugins:
  - search:
      lang: it
  - tags

extra:
  generator: false

copyright: Copyright Custom S.p.A. 2026

nav:
  - Introduzione: index.md
  - Acquisto e attivazione: acquisto.md
  - Configurazione iniziale:
    - Configurazione: configurazione.md
    - Interfaccia: interfaccia.md
    - Modifica tema grafico: 14_modifica_tema_grafico.md
    - Azienda e Sede: azienda_sedi.md
    - Catalogo Trattamenti: settori_commerciali.md
    - Orario sede e turni: 52_configurare_turni_e_orarilavoro.md
  - Anagrafiche:
    - Operatori: operatori.md
    - Risorse: gestione_risorse.md
    - Trattamenti: trattamenti.md
    - Trattamenti vista semplificata: trattamenti_vista_semplice.md
    - Prodotti: prodotti.md
    - Clienti: clienti.md
   